<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قميص المنتخب الجزائري 🇩🇿</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #006233;
    --green-light: #00853F;
    --red: #D21034;
    --white: #FFFFFF;
    --off-white: #F7F9F7;
    --light: #EEF3EF;
    --border: #D5E8DB;
    --text-dark: #0D1F12;
    --text-mid: #3A5C44;
    --text-muted: #7A9E85;
    --shadow: rgba(0,98,51,0.1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Cairo',sans-serif;background:#0a0f0a;color:var(--text-dark);min-height:100vh;}

  /* تم إبقاء كل التنسيقات الأصلية كما هي في ملفك */
  .announce{backdrop-filter:blur(2px);background:linear-gradient(90deg,rgba(0,98,51,0.8),rgba(210,16,52,0.8));color:white;text-align:center;padding:12px;font-size:0.95rem;font-weight:600;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,0.1);}

  .main-card{max-width:1100px;margin:40px auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;display:grid;grid-template-columns:1.2fr 1fr;overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,0.3);position:relative;z-index:10;border:1px solid rgba(255,255,255,0.2);}

  @media (max-width:900px){ .main-card{grid-template-columns:1fr;margin:15px;border-radius:20px;} }

  .gallery-side{padding:30px;background:var(--off-white);display:flex;flex-direction:column;gap:20px;align-items:center;}
  .main-pic{width:100%;aspect-ratio:4/5;background:#fff;border-radius:20px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 15px 35px var(--shadow);border:1px solid var(--border);}
  .main-pic img{width:100%;height:100%;object-fit:cover;}

  .info-side{padding:40px;display:flex;flex-direction:column;gap:25px;border-right:1px solid #eee;}
  .badge{display:inline-block;padding:5px 15px;background:rgba(0,98,51,0.1);color:var(--green);border-radius:50px;font-weight:700;font-size:0.85rem;width:fit-content;letter-spacing:0.5px;}
  h1{font-size:2.2rem;color:var(--text-dark);font-weight:900;line-height:1.2;}
  .price-tag{display:flex;align-items:baseline;gap:12px;margin:5px 0;}
  .curr-price{font-size:2.8rem;font-weight:900;color:var(--green);text-shadow:0 2px 10px rgba(0,98,51,0.1);}
  .old-price{text-decoration:line-through;color:var(--text-muted);font-size:1.3rem;}

  .size-picker{display:flex;gap:12px;margin-top:10px;}
  .sz{width:50px;height:50px;border:2px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;transition:0.3s;background:white;}
  .sz.on{border-color:var(--green);background:var(--green);color:white;transform:scale(1.05);box-shadow:0 5px 15px rgba(0,98,51,0.2);}

  .order-box{background:var(--light);padding:30px;border-radius:25px;border:1px solid var(--border);margin-top:10px;position:relative;}
  .input-g{margin-bottom:20px;}
  .input-g label{display:block;margin-bottom:8px;font-weight:700;color:var(--text-mid);font-size:0.9rem;margin-right:5px;}
  .input-g input{width:100%;padding:15px;border:2px solid var(--border);border-radius:15px;font-family:inherit;font-size:1rem;outline:none;transition:0.3s;background:white;}
  .input-g input:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(0,98,51,0.05);}

  .confirm-btn{width:100%;padding:20px;background:var(--red);color:white;border:none;border-radius:18px;font-size:1.3rem;font-weight:800;cursor:pointer;transition:0.4s;box-shadow:0 10px 25px rgba(210,16,52,0.3);display:flex;align-items:center;justify-content:center;gap:10px;}
  .confirm-btn:hover{transform:translateY(-3px);box-shadow:0 15px 35px rgba(210,16,52,0.4);filter:brightness(1.1);}

  /* تم حذف أكواد الـ Canvas و star-p الأنميشن من هنا */
</style>
</head>
<body>

<div class="announce">⚡ عرض حصري: خصم 25% + توصيل مجاني اليوم فقط! 🇩🇿</div>

<div class="main-card">
  <div class="gallery-side">
    <div class="main-pic">
      <img src="https://via.placeholder.com/500" alt="القميص">
    </div>
  </div>

  <div class="info-side">
    <div class="badge">الأكثر طلباً هذا الأسبوع 🔥</div>
    <h1>قميص المنتخب الوطني الجزائري 2024</h1>
    
    <div class="price-tag">
      <span class="curr-price">4,500 دج</span>
      <span class="old-price">6,000 دج</span>
    </div>

    <div class="size-section">
      <p style="font-weight:700; margin-bottom:12px;">المقاس المتوفر:</p>
      <div class="size-picker">
        <div class="sz" onclick="sel(this)">S</div>
        <div class="sz on" onclick="sel(this)">M</div>
        <div class="sz" onclick="sel(this)">L</div>
        <div class="sz" onclick="sel(this)">XL</div>
      </div>
    </div>

    <div class="order-box">
      <div class="input-g">
        <label>الاسم واللقب</label>
        <input type="text" id="custName" placeholder="أدخل اسمك الكامل">
      </div>
      <div class="input-g">
        <label>رقم الهاتف</label>
        <input type="tel" id="custPhone" placeholder="06 / 07 / 05">
      </div>
      <div class="input-g">
        <label>العنوان</label>
        <input type="text" id="custAddress" placeholder="الولاية، البلدية، الحي">
      </div>
      <button class="confirm-btn" onclick="sendOrder()">تأكيد الطلب</button>
    </div>
  </div>
</div>

<script>
  function sel(el) {
    document.querySelectorAll('.sz').forEach(s => s.classList.remove('on'));
    el.classList.add('on');
  }

  async function sendOrder() {
    const name = document.getElementById('custName').value;
    const phone = document.getElementById('custPhone').value;
    const address = document.getElementById('custAddress').value;
    const size = document.querySelector('.sz.on').innerText;

    if(!name || !phone || !address) {
      alert("يرجى إدخال جميع البيانات");
      return;
    }

    // إعدادات Telegram
    const botToken = "YOUR_BOT_TOKEN"; 
    const chatId = "YOUR_CHAT_ID";
    
    const text = `📦 طلب جديد:\n👤 الاسم: ${name}\n📞 الهاتف: ${phone}\n📍 العنوان: ${address}\n👕 المقاس: ${size}`;
    const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;

    try {
      const res = await fetch(url);
      if(res.ok) alert("تم إرسال طلبك بنجاح!");
      else alert("خطأ في الإرسال");
    } catch(e) {
      alert("خطأ في الاتصال");
    }
  }
</script>

</body>
</html>
