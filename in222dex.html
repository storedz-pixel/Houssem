<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قميص المنتخب الجزائري 🇩🇿</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #006233;
    --green-light: #00853F;
    --red: #D21034;
    --white: #FFFFFF;
    --off-white: #F7F9F7;
    --light: #EEF3EF;
    --border: #D5E8DB;
    --text-dark: #0D1F12;
    --text-mid: #3A5C44;
    --text-muted: #7A9E85;
    --shadow: rgba(0,98,51,0.1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Cairo',sans-serif;background:#0a0f0a;color:var(--text-dark);min-height:100vh;}

  .announce{backdrop-filter:blur(2px);background:linear-gradient(90deg,rgba(0,98,51,0.8),rgba(210,16,52,0.8));color:white;text-align:center;padding:12px;font-size:0.95rem;font-weight:600;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,0.1);}

  .main-card{max-width:1100px;margin:40px auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:30px;display:grid;grid-template-columns:1.2fr 1fr;overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,0.3);position:relative;z-index:10;border:1px solid rgba(255,255,255,0.2);}

  @media (max-width:900px){ .main-card{grid-template-columns:1fr;margin:15px;border-radius:20px;} }

  .gallery-side{padding:30px;background:var(--off-white);display:flex;flex-direction:column;gap:20px;align-items:center;}
  .main-pic{width:100%;aspect-ratio:4/5;background:#fff;border-radius:20px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 15px 35px var(--shadow);border:1px solid var(--border);}
  .main-pic img{width:100%;height:100%;object-fit:cover;}

  .info-side{padding:40px;display:flex;flex-direction:column;gap:25px;border-right:1px solid #eee;background:white;}
  .badge{display:inline-block;padding:5px 15px;background:rgba(0,98,51,0.1);color:var(--green);border-radius:50px;font-weight:700;font-size:0.85rem;width:fit-content;}
  h1{font-size:2.2rem;color:var(--text-dark);font-weight:900;line-height:1.2;}
  
  .price-tag{display:flex;align-items:baseline;gap:12px;}
  .curr-price{font-size:2.8rem;font-weight:900;color:var(--green);}
  .old-price{text-decoration:line-through;color:var(--text-muted);font-size:1.3rem;}

  .size-picker{display:flex;gap:12px;margin-top:10px;}
  .sz{width:50px;height:50px;border:2px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;transition:0.3s;background:white;}
  .sz.on{border-color:var(--green);background:var(--green);color:white;}

  .order-box{background:var(--light);padding:30px;border-radius:25px;border:1px solid var(--border);margin-top:10px;}
  .input-g{margin-bottom:20px;}
  .input-g label{display:block;margin-bottom:8px;font-weight:700;color:var(--text-mid);font-size:0.9rem;}
  .input-g input, .input-g select{width:100%;padding:15px;border:2px solid var(--border);border-radius:15px;font-family:inherit;font-size:1rem;outline:none;background:white;}

  .confirm-btn{width:100%;padding:20px;background:var(--red);color:white;border:none;border-radius:18px;font-size:1.3rem;font-weight:800;cursor:pointer;transition:0.4s;box-shadow:0 10px 25px rgba(210,16,52,0.3);}
  .confirm-btn:hover{transform:translateY(-3px);}
</style>
</head>
<body>

<div class="announce">⚡ عرض حصري: خصم 25% + توصيل لـ 58 ولاية! 🇩🇿</div>

<div class="main-card">
  <div class="gallery-side">
    <div class="main-pic">
      <img src="https://via.placeholder.com/600x750/f7f9f7/006233?text=Jersey+2024" alt="القميص">
    </div>
  </div>

  <div class="info-side">
    <div class="badge">الأكثر طلباً 🔥</div>
    <h1>قميص المنتخب الوطني 2024</h1>
    
    <div class="price-tag">
      <span class="curr-price">4,500 دج</span>
      <span class="old-price">6,000 دج</span>
    </div>

    <div class="size-section">
      <p style="font-weight:700; margin-bottom:12px;">المقاس:</p>
      <div class="size-picker">
        <div class="sz" onclick="sel(this)">S</div>
        <div class="sz on" onclick="sel(this)">M</div>
        <div class="sz" onclick="sel(this)">L</div>
        <div class="sz" onclick="sel(this)">XL</div>
      </div>
    </div>

    <div class="order-box">
      <div class="input-g">
        <label>الاسم واللقب</label>
        <input type="text" id="custName" placeholder="أدخل اسمك الكامل">
      </div>
      <div class="input-g">
        <label>رقم الهاتف</label>
        <input type="tel" id="custPhone" placeholder="06 / 07 / 05">
      </div>
      <div class="input-g">
        <label>الولاية</label>
        <select id="custState">
          <option value="">اختر الولاية</option>
          <option value="1">01 - أدرار</option>
          <option value="2">02 - الشلف</option>
          <option value="3">03 - الأغواط</option>
          <option value="4">04 - أم البواقي</option>
          <option value="5">05 - باتنة</option>
          <option value="6">06 - بجاية</option>
          <option value="7">07 - بسكرة</option>
          <option value="8">08 - بشار</option>
          <option value="9">09 - البليدة</option>
          <option value="10">10 - البويرة</option>
          <option value="11">11 - تمنراست</option>
          <option value="12">12 - تبسة</option>
          <option value="13">13 - تلمسان</option>
          <option value="14">14 - تيارت</option>
          <option value="15">15 - تيزي وزو</option>
          <option value="16">16 - الجزائر</option>
          <option value="17">17 - الجلفة</option>
          <option value="18">18 - جيجل</option>
          <option value="19">19 - سطيف</option>
          <option value="20">20 - سعيدة</option>
          <option value="21">21 - سكيكدة</option>
          <option value="22">22 - سيدي بلعباس</option>
          <option value="23">23 - عنابة</option>
          <option value="24">24 - قالمة</option>
          <option value="25">25 - قسنطينة</option>
          <option value="26">26 - المدية</option>
          <option value="27">27 - مستغانم</option>
          <option value="28">28 - المسيلة</option>
          <option value="29">29 - معسكر</option>
          <option value="30">30 - ورقلة</option>
          <option value="31">31 - وهران</option>
          <option value="32">32 - البيض</option>
          <option value="33">33 - إليزي</option>
          <option value="34">34 - برج بوعريريج</option>
          <option value="35">35 - بومرداس</option>
          <option value="36">36 - الطارف</option>
          <option value="37">37 - تندوف</option>
          <option value="38">38 - تسمسيلت</option>
          <option value="39">39 - الوادي</option>
          <option value="40">40 - خنشلة</option>
          <option value="41">41 - سوق أهراس</option>
          <option value="42">42 - تيبازة</option>
          <option value="43">43 - ميلة</option>
          <option value="44">44 - عين الدفلى</option>
          <option value="45">45 - النعامة</option>
          <option value="46">46 - عين تموشنت</option>
          <option value="47">47 - غرداية</option>
          <option value="48">48 - غليزان</option>
          <option value="49">49 - تيميمون</option>
          <option value="50">50 - برج باجي مختار</option>
          <option value="51">51 - أولاد جلال</option>
          <option value="52">52 - بني عباس</option>
          <option value="53">53 - عين صالح</option>
          <option value="54">54 - عين قزام</option>
          <option value="55">55 - تقرت</option>
          <option value="56">56 - جنايت</option>
          <option value="57">57 - المغير</option>
          <option value="58">58 - المنيعة</option>
        </select>
      </div>
      <div class="input-g">
        <label>العنوان بالتفصيل</label>
        <input type="text" id="custAddress" placeholder="الحي، رقم الباب...">
      </div>
      <button class="confirm-btn" onclick="confirmOrder()">تأكيد الطلب</button>
    </div>
  </div>
</div>

<script>
  function sel(el) {
    document.querySelectorAll('.sz').forEach(s => s.classList.remove('on'));
    el.classList.add('on');
  }

  function confirmOrder() {
    const name = document.getElementById('custName').value;
    const state = document.getElementById('custState').value;
    if(!name || !state) {
      alert("يرجى إكمال البيانات");
      return;
    }
    alert("شكراً لك " + name + "، تم استلام طلبك لولاية رقم " + state);
  }
</script>

</body>
</html>
